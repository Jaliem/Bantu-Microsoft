name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    if: ${{ gitea.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Stop and remove existing container
        run: docker rm -f bantu-app || true

      - name: Run new container
        run: |
          docker run -d \
            --name bantu-app \
            --restart unless-stopped \
            -p 3031:3031 \
            -e MAYAR_API_KEY=${{ secrets.MAYAR_API_KEY }} \
            -e MAYAR_WEBHOOK_TOKEN=${{ secrets.MAYAR_WEBHOOK_TOKEN }} \
            -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            -e CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }} \
            -e CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }} \
            -e CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }} \
            -e SMTP_HOST=${{ secrets.SMTP_HOST }} \
            -e SMTP_PORT=${{ secrets.SMTP_PORT }} \
            -e SMTP_USER=${{ secrets.SMTP_USER }} \
            -e SMTP_PASS=${{ secrets.SMTP_PASS }} \
            -e NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} \
            bantu-app:latest

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:3031 || (docker logs bantu-app && exit 1)
