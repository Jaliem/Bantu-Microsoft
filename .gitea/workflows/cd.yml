name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    if: ${{ gitea.event.workflow_run.conclusion == 'success' }}
    env:
      CONTAINER_NAME: bantu-app
      IMAGE_NAME: bantu-app:latest
      APP_PORT: 3031

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stop and remove existing container
        run: docker rm -f "$CONTAINER_NAME" || true

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }} \
            --build-arg NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} \
            -t "$IMAGE_NAME" \
            .

      - name: Verify built image
        run: |
          echo "IMAGE_NAME=$IMAGE_NAME"
          docker image inspect "$IMAGE_NAME" >/dev/null

      - name: List local images (debug)
        run: |
          docker image ls --format '{{.Repository}}:{{.Tag}} {{.ID}}' | grep -E '^(bantu-app|qvlv):' || true

      - name: Run new container
        run: |
          set -e
          set -x
          echo "Using docker binary: $(command -v docker)"
          type docker || true
          echo "Running image: $IMAGE_NAME"
          docker run -d \
            --pull=never \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "$APP_PORT":3031 \
            -e MAYAR_API_KEY=${{ secrets.MAYAR_API_KEY }} \
            -e MAYAR_WEBHOOK_TOKEN=${{ secrets.MAYAR_WEBHOOK_TOKEN }} \
            -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            -e CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }} \
            -e CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }} \
            -e CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }} \
            -e SMTP_HOST=${{ secrets.SMTP_HOST }} \
            -e SMTP_PORT=${{ secrets.SMTP_PORT }} \
            -e SMTP_USER=${{ secrets.SMTP_USER }} \
            -e SMTP_PASS=${{ secrets.SMTP_PASS }} \
            -e NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} \
            "$IMAGE_NAME"

      - name: Health check
        run: |
          set -e
          for i in $(seq 1 10); do
            if curl -f http://localhost:$APP_PORT; then
              exit 0
            fi
            sleep 3
          done
          docker logs "$CONTAINER_NAME"
          exit 1
